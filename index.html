<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
<meta charset="UTF-8">
<title>NALGYA FASHION — Fashion Wanita Kontemporer</title>

<!--
  Struktur halaman ini sengaja memakai tag <frameset>/<frame> klasik HTML,
  sesuai contoh "FRAME pada HTML": satu frame atas (header), lalu bersarang
  dua frame di bawahnya (sidebar kategori + konten katalog).
-->
<frameset rows="90,*" border="0" frameborder="0" framespacing="0">
  <frame src="topbar.html" name="topFrame" scrolling="no" noresize marginwidth="0" marginheight="0">
  <frameset cols="240,*" border="0" frameborder="0" framespacing="0">
    <frame src="sidebar.html" name="sideFrame" scrolling="auto" marginwidth="0" marginheight="0">
    <frame src="catalog.html" name="mainFrame" scrolling="auto" marginwidth="0" marginheight="0">
  </frameset>
</frameset>

<noframes>
  <body>
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; font-family:sans-serif; padding:40px;">
      <div style="max-width:420px;">
        <h2>NALGYA FASHION</h2>
        <p>Browser kamu tidak mendukung tampilan frame. Silakan buka katalog langsung.</p>
        <a href="catalog.html" style="display:inline-block; background:#211d1a; color:#fff; padding:12px 22px; text-decoration:none;">Buka Katalog</a>
      </div>
    </div>
  </body>
</noframes>
</html>
