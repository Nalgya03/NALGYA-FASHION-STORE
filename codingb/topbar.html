<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="frame-doc dark">

<div class="topbar">
  <a href="catalog.html" target="mainFrame" class="brand">
    <svg class="brand__mark" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="#b08d3e" stroke-width="1.4"/>
      <path d="M20 8c-3 4-3 6 0 9 3-3 3-5 0-9z" fill="#b08d3e"/>
      <path d="M12 32c2-8 5-11 8-11s6 3 8 11" stroke="#fbf9f6" stroke-width="1.4" fill="none"/>
    </svg>
    <span>NALGYA FASHION<small>fashion wanita</small></span>
  </a>

  <div class="topbar__search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" data-search placeholder="Cari dress, kemeja, aksesoris...">
  </div>

  <div class="topbar__actions">
    <nav class="topbar__nav">
      <a href="catalog.html" target="mainFrame">Katalog</a>
      <a href="checkout.html" target="_top">Keranjang</a>
    </nav>
    <a href="checkout.html" target="_top" class="cart-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L4 2H1"/><circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/></svg>
      Keranjang
      <span class="cart-badge" data-cart-badge>0</span>
    </a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
